<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get Started — Umbrella5D</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="logo/Umbrella_icon.png" type="image/png" />
  <style>
    /* ── Onboarding-specific styles ── */
    .onboarding-bg {
      min-height: 100vh;
      padding: calc(var(--nav-h) + 3rem) 1.5rem 3rem;
      background: var(--clr-hero-bg);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      position: relative;
    }
    .onboarding-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(108,99,255,.18) 0%, transparent 70%);
      pointer-events: none;
    }
    .onboarding-card {
      position: relative;
      width: 100%;
      max-width: 520px;
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: 1.25rem;
      padding: 2.5rem 2.25rem 2.25rem;
    }
    .onboarding-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .onboarding-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.25rem;
    }
    .onboarding-logo img {
      height: 72px;
      width: auto;
    }
    .onboarding-header h1 {
      font-size: 1.55rem;
      font-weight: 800;
      color: var(--clr-text);
      margin-bottom: .35rem;
    }
    .onboarding-header p {
      font-size: .9rem;
      color: var(--clr-muted);
    }

    /* ── Path cards ── */
    .path-options {
      display: flex;
      flex-direction: column;
      gap: .75rem;
      margin-bottom: 1.5rem;
    }
    .path-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.1rem 1.25rem;
      border: 2px solid var(--clr-border);
      border-radius: .875rem;
      cursor: pointer;
      background: transparent;
      text-align: left;
      width: 100%;
      transition: border-color .15s, background .15s;
      color: var(--clr-text);
    }
    .path-card:hover {
      border-color: var(--clr-primary);
      background: rgba(108,99,255,.06);
    }
    .path-card.is-selected {
      border-color: var(--clr-primary);
      background: rgba(108,99,255,.1);
    }
    .path-card__icon {
      width: 42px;
      height: 42px;
      border-radius: .625rem;
      background: rgba(108,99,255,.15);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      stroke: var(--clr-primary);
    }
    .path-card__icon svg {
      width: 22px;
      height: 22px;
    }
    .path-card__text strong {
      display: block;
      font-size: .95rem;
      font-weight: 700;
      margin-bottom: .15rem;
    }
    .path-card__text span {
      font-size: .82rem;
      color: var(--clr-muted);
    }

    /* ── Expandable form panels ── */
    .path-panel {
      display: none;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 1.5rem;
      padding: 1.25rem;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--clr-border);
      border-radius: .875rem;
    }
    .path-panel.is-visible {
      display: flex;
    }
    .path-panel .form-group {
      margin-bottom: 0;
    }

    /* ── Status message ── */
    .onboarding-status {
      font-size: .875rem;
      text-align: center;
      min-height: 1.25rem;
      color: var(--clr-muted);
      margin-bottom: .75rem;
    }
    .onboarding-status.is-error { color: #f87171; }
    .onboarding-status.is-success { color: #4ade80; }
  </style>
</head>
<body>

  <!-- ══ APP NAV ══ -->
  <header class="site-header" style="background:#06060f;">
    <nav class="nav">
      <a class="nav-brand" href="dashboard.html">
        <img src="logo/Umbrella_logo.png" alt="Umbrella5D" class="nav-logo-img" />
      </a>
      <div class="nav-actions">
        <button id="signout-btn" class="btn btn--primary btn--sm">Sign Out</button>
      </div>
    </nav>
  </header>

  <main class="onboarding-bg">
    <div class="onboarding-card">

      <div class="onboarding-header">
        <div class="onboarding-logo">
          <img src="logo/Umbrella_icon.png" alt="Umbrella5D" />
        </div>
        <h1>Welcome to Umbrella5D</h1>
        <p>Let's get your account set up. How are you joining?</p>
      </div>

      <!-- ── Path selector ── -->
      <div class="path-options">

        <button class="path-card" data-path="create" type="button">
          <div class="path-card__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <line x1="19" y1="8" x2="19" y2="14"/>
              <line x1="16" y1="11" x2="22" y2="11"/>
            </svg>
          </div>
          <div class="path-card__text">
            <strong>Create an Organization</strong>
            <span>I'm an account manager setting up my team</span>
          </div>
        </button>

        <button class="path-card" data-path="join" type="button">
          <div class="path-card__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
              <polyline points="10 17 15 12 10 7"/>
              <line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
          </div>
          <div class="path-card__text">
            <strong>Join an Organization</strong>
            <span>I have an invite code from my account manager</span>
          </div>
        </button>

        <button class="path-card" data-path="individual" type="button">
          <div class="path-card__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <div class="path-card__text">
            <strong>Continue as Individual</strong>
            <span>I'm joining on my own, not as part of a team</span>
          </div>
        </button>

      </div>

      <!-- ── Create org form ── -->
      <div class="path-panel" id="panel-create">
        <div class="form-group">
          <label class="form-label" for="org-name">Organization name</label>
          <input class="form-input" type="text" id="org-name" placeholder="e.g. Acme Sales Co." />
        </div>
      </div>

      <!-- ── Join org form ── -->
      <div class="path-panel" id="panel-join">
        <div class="form-group">
          <label class="form-label" for="invite-code">Invite code</label>
          <input class="form-input" type="text" id="invite-code" placeholder="Enter your 8-character invite code" autocomplete="off" />
        </div>
      </div>

      <!-- ── Status + CTA ── -->
      <p class="onboarding-status" id="onboarding-status"></p>

      <button class="btn btn--primary btn--full" id="continue-btn" type="button" disabled>
        <span id="continue-label">Select an option above</span>
        <svg id="continue-spinner" class="btn-spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="display:none" aria-hidden="true">
          <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
        </svg>
      </button>

    </div>
  </main>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

    const supabase = createClient(
      'https://tvppkzkqrodrkxemxnvi.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR2cHBremtxcm9kcmt4ZW14bnZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MzcxODQsImV4cCI6MjA5MTExMzE4NH0.Z70otGFaOER5KNj2yc7Wk5nl1KiIvKHuFSXHBMnAdUA'
    )

    /* ── Auth guard ── */
    const { data: { session } } = await supabase.auth.getSession()
    if (!session) { window.location.href = 'login.html' }
    const userId = session.user.id

    /* ── Sign out ── */
    document.getElementById('signout-btn').addEventListener('click', async () => {
      await supabase.auth.signOut()
      window.location.href = 'login.html'
    })

    /* ── State ── */
    let selectedPath = null

    const continueBtn    = document.getElementById('continue-btn')
    const continueLabel  = document.getElementById('continue-label')
    const continueSpinner = document.getElementById('continue-spinner')
    const statusEl       = document.getElementById('onboarding-status')

    /* ── Path card selection ── */
    document.querySelectorAll('.path-card').forEach(card => {
      card.addEventListener('click', () => {
        document.querySelectorAll('.path-card').forEach(c => c.classList.remove('is-selected'))
        document.querySelectorAll('.path-panel').forEach(p => p.classList.remove('is-visible'))

        card.classList.add('is-selected')
        selectedPath = card.dataset.path

        if (selectedPath === 'create') {
          document.getElementById('panel-create').classList.add('is-visible')
          continueLabel.textContent = 'Create Organization'
        } else if (selectedPath === 'join') {
          document.getElementById('panel-join').classList.add('is-visible')
          continueLabel.textContent = 'Join Organization'
        } else {
          continueLabel.textContent = 'Continue as Individual'
        }

        continueBtn.disabled = false
        statusEl.textContent = ''
        statusEl.className = 'onboarding-status'
      })
    })

    /* ── Continue button ── */
    continueBtn.addEventListener('click', async () => {
      if (!selectedPath) return

      continueBtn.disabled = true
      continueSpinner.style.display = 'block'
      statusEl.textContent = ''
      statusEl.className = 'onboarding-status'

      if (selectedPath === 'create') {
        await handleCreate()
      } else if (selectedPath === 'join') {
        await handleJoin()
      } else {
        await handleIndividual()
      }

      continueBtn.disabled = false
      continueSpinner.style.display = 'none'
    })

    /* ── Create org ── */
    async function handleCreate() {
      const name = document.getElementById('org-name').value.trim()
      if (!name) {
        showError('Please enter an organization name.')
        return
      }

      // Create the org
      const { data: org, error: orgErr } = await supabase
        .from('organizations')
        .insert({ name, owner_id: userId, plan_tier: 'organization' })
        .select()
        .single()

      if (orgErr) { showError('Could not create organization. Please try again.'); return }

      // Add creator as admin member
      const { error: memberErr } = await supabase
        .from('org_members')
        .insert({ org_id: org.id, user_id: userId, role: 'admin' })

      if (memberErr) { showError('Organization created but could not assign role. Contact support.'); return }

      // Update profile
      await supabase.from('profiles').update({
        org_id: org.id,
        organization_name: name,
        role_title: 'Account Manager'
      }).eq('id', userId)

      window.location.href = 'dashboard.html'
    }

    /* ── Join org via invite code ── */
    async function handleJoin() {
      const code = document.getElementById('invite-code').value.trim()
      if (!code) {
        showError('Please enter your invite code.')
        return
      }

      // Look up org by invite code
      const { data: org, error: orgErr } = await supabase
        .from('organizations')
        .select('id, name')
        .eq('invite_code', code)
        .single()

      if (orgErr || !org) { showError('Invalid invite code. Please check with your account manager.'); return }

      // Check not already a member
      const { data: existing } = await supabase
        .from('org_members')
        .select('id')
        .eq('org_id', org.id)
        .eq('user_id', userId)
        .single()

      if (existing) {
        // Already a member — just go to dashboard
        window.location.href = 'dashboard.html'
        return
      }

      // Add as member
      const { error: memberErr } = await supabase
        .from('org_members')
        .insert({ org_id: org.id, user_id: userId, role: 'member' })

      if (memberErr) { showError('Could not join organization. Please try again.'); return }

      // Update profile
      await supabase.from('profiles').update({
        org_id: org.id,
        organization_name: org.name,
        role_title: 'Member'
      }).eq('id', userId)

      window.location.href = 'dashboard.html'
    }

    /* ── Individual ── */
    async function handleIndividual() {
      await supabase.from('profiles').update({
        org_id: null,
        organization_name: 'Individual',
        role_title: 'Individual'
      }).eq('id', userId)

      window.location.href = 'dashboard.html'
    }

    /* ── Helpers ── */
    function showError(msg) {
      statusEl.textContent = msg
      statusEl.className = 'onboarding-status is-error'
    }
  </script>

</body>
</html>
