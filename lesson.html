<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lesson — Umbrella5D</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-lesson">

  <!-- ══ TOP NAV ══ -->
  <header class="site-header">
    <nav class="nav">
      <a class="nav-brand" href="index.html">
        <img src="logo/Umbrella_logo.png" alt="Umbrella5D" class="nav-logo-img" />
      </a>

      <ul class="nav-links">
        <li><a href="features.html">Features</a></li>
        <li><a href="index.html#about">About</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>

      <div class="nav-actions">
        <a href="dashboard.html" class="nav-signin">Dashboard</a>
        <a href="login.html" class="btn btn--primary btn--sm">Get started free</a>
      </div>
    </nav>
  </header>

  <main class="lesson-main">

    <div class="lesson-header">
      <a href="dashboard.html" class="lesson-back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15" aria-hidden="true">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Back to Dashboard
      </a>
      <p class="section-eyebrow" id="lesson-module-label">Module 1</p>
      <h1 id="lesson-title">Lesson 1</h1>
    </div>

    <div class="lesson-body">

      <!-- Video player (shown only for Module 1, Lesson 1) -->
      <div id="lesson-video" class="lesson-video-wrap" hidden>
        <div class="video-wrapper">
          <iframe
            src="https://player.vimeo.com/video/716223733"
            title="Module 1 — Lesson 1 Video"
            frameborder="0"
            allow="autoplay; fullscreen; picture-in-picture"
            allowfullscreen>
          </iframe>
        </div>
      </div>

      <!-- Placeholder for lessons without content yet -->
      <div id="lesson-placeholder" class="lesson-placeholder" hidden>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="48" height="48" aria-hidden="true">
          <polygon points="23 7 16 12 23 17 23 7"/>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
        </svg>
        <p>Content coming soon.</p>
        <p class="lesson-placeholder-sub">Check back as the program rolls out.</p>
      </div>

      <!-- Complete button -->
      <div class="lesson-complete-section">
        <button id="complete-btn" class="btn btn--primary btn--lg lesson-complete-btn" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="20" height="20" aria-hidden="true">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          <span id="complete-btn-label">Mark Lesson Complete</span>
        </button>
      </div>

    </div>
    <!-- /lesson-body -->

  </main>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

    const supabase = createClient(
      'https://tvppkzkqrodrkxemxnvi.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR2cHBremtxcm9kcmt4ZW14bnZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MzcxODQsImV4cCI6MjA5MTExMzE4NH0.Z70otGFaOER5KNj2yc7Wk5nl1KiIvKHuFSXHBMnAdUA'
    )

    /* ── Auth guard ── */
    const { data: { session } } = await supabase.auth.getSession()
    if (!session) { window.location.href = 'login.html' }

    const userId  = session.user.id
    const params  = new URLSearchParams(window.location.search)
    const m       = parseInt(params.get('m'), 10) || 1
    const l       = parseInt(params.get('l'), 10) || 1
    const lessonId = m + '-' + l

    const moduleNames = {
      1: 'The Five Dimensions',
      2: 'The Customer Paradigm',
      3: 'The Umbrella Machine',
      4: 'Implementation in Practice',
      5: 'Revenue, Profits & Glory'
    }

    /* ── Set page metadata ── */
    document.getElementById('lesson-module-label').textContent =
      'Module ' + m + (moduleNames[m] ? ' \u2014 ' + moduleNames[m] : '')
    document.getElementById('lesson-title').textContent = 'Lesson ' + l
    document.title = 'Module ' + m + ' \u2014 Lesson ' + l + ' \u2014 Umbrella5D'

    /* ── Show video or placeholder ── */
    if (m === 1 && l === 1) {
      document.getElementById('lesson-video').hidden = false
      document.getElementById('lesson-placeholder').hidden = true
    } else {
      document.getElementById('lesson-placeholder').hidden = false
    }

    /* ── Check completion from Supabase ── */
    async function getIsCompleted() {
      const { data } = await supabase
        .from('lesson_progress')
        .select('completed')
        .eq('user_id', userId)
        .eq('lesson_id', lessonId)
        .single()
      return data?.completed === true
    }

    /* ── Save completion to Supabase ── */
    async function setCompleted(value) {
      if (value) {
        await supabase.from('lesson_progress').upsert({
          user_id:   userId,
          lesson_id: lessonId,
          completed: true
        }, { onConflict: 'user_id,lesson_id' })
      } else {
        await supabase.from('lesson_progress')
          .delete()
          .eq('user_id', userId)
          .eq('lesson_id', lessonId)
      }
    }

    /* ── Render button state ── */
    function renderButton(isDone) {
      const btn   = document.getElementById('complete-btn')
      const label = document.getElementById('complete-btn-label')
      if (isDone) {
        btn.classList.add('lesson-complete-btn--done')
        label.textContent = 'Completed — Click to Undo'
      } else {
        btn.classList.remove('lesson-complete-btn--done')
        label.textContent = 'Mark Lesson Complete'
      }
    }

    /* ── Initial render ── */
    const isDoneOnLoad = await getIsCompleted()
    renderButton(isDoneOnLoad)

    /* ── Toggle on click ── */
    document.getElementById('complete-btn').addEventListener('click', async function () {
      const isDone = await getIsCompleted()
      await setCompleted(!isDone)
      renderButton(!isDone)
    })
  </script>

</body>
</html>
